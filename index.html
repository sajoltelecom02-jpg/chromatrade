<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChromaTrade - Color Prediction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#0f172a', // Slate 900
              secondary: '#1e293b', // Slate 800
              accent: '#f59e0b', // Amber 500
              'win-green': '#10b981',
              'win-red': '#ef4444',
              'win-violet': '#8b5cf6',
            },
            keyframes: {
              slideUp: {
                '0%': { transform: 'translateY(100%)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              winFlash: {
                '0%': { backgroundColor: 'rgba(16, 185, 129, 0.1)' },
                '50%': { backgroundColor: 'rgba(16, 185, 129, 0.25)' },
                '100%': { backgroundColor: 'rgba(16, 185, 129, 0.1)' },
              },
              lossFlash: {
                '0%': { backgroundColor: 'rgba(239, 68, 68, 0.05)' },
                '50%': { backgroundColor: 'rgba(239, 68, 68, 0.15)' },
                '100%': { backgroundColor: 'rgba(239, 68, 68, 0.05)' },
              },
              flapper: {
                '0%': { transform: 'rotate(0deg)' },
                '25%': { transform: 'rotate(15deg)' },
                '100%': { transform: 'rotate(0deg)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              shake: {
                '0%, 100%': { transform: 'translateX(0)' },
                '25%': { transform: 'translateX(-5px)' },
                '75%': { transform: 'translateX(5px)' },
              }
            },
            animation: {
              'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'slide-up': 'slideUp 0.3s ease-out forwards',
              'fade-in': 'fadeIn 0.3s ease-out forwards',
              'win-pulse': 'winFlash 2s ease-in-out infinite',
              'loss-pulse': 'lossFlash 2s ease-in-out infinite',
              'flapper': 'flapper 0.08s ease-out infinite',
              'float': 'float 3s ease-in-out infinite',
              'shake': 'shake 0.2s ease-in-out 0s 2',
            }
          },
        },
      };
    </script>
    <style>
      /* Custom Scrollbar for sleek look */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #0f172a;
      }
      ::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 3px;
      }
      body {
        background-color: #0f172a;
        color: white;
        font-family: 'Inter', sans-serif;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
